name: Build Windows EXE

# 수동 실행 + main 브랜치 푸시 시 자동 빌드
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '세린캠_갤럭시_초기화_GUI.py'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: windows-latest   # GitHub이 제공하는 Windows 서버에서 빌드

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: PyInstaller 설치
        run: python -m pip install --upgrade pip pyinstaller

      # adb(platform-tools)를 구글 공식 배포처에서 직접 받아 EXE에 번들
      - name: platform-tools 다운로드
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "pt.zip"
          Expand-Archive -Path "pt.zip" -DestinationPath "." -Force
          if (-not (Test-Path "platform-tools\adb.exe")) { throw "adb.exe 없음" }
          Write-Host "platform-tools OK"
        shell: pwsh

      - name: EXE 빌드
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "세린캠_반납폰_초기화" `
            --add-data "platform-tools;platform-tools" `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module matplotlib `
            "세린캠_갤럭시_초기화_GUI.py"
        shell: pwsh

      # APK는 저장소에 넣지 않는다 (GitHub 100MB 제한 + 저장소 비대화)
      # → 빈 apks 폴더만 만들고, 사용자가 직접 APK를 넣는다
      - name: 배포 폴더 구성
        run: |
          New-Item -ItemType Directory -Force -Path "dist\apks" | Out-Null
          "이 폴더에 APK 파일을 넣으세요. (.apk / .xapk / .apks / .apkm)" |
            Out-File -FilePath "dist\apks\여기에_APK를_넣으세요.txt" -Encoding utf8

          @"
          [세린캠 반납폰 초기화 도구]

          ■ 최초 세팅
          1. 이 폴더의 apks 안에 재설치할 APK를 넣으세요.
             (.apk / .xapk / .apks / .apkm 지원)
          2. 이 폴더는 통째로 옮겨야 합니다. EXE만 빼내면 apks를 못 찾습니다.

          ■ 사용법
          1. 폰: 설정 > 개발자 옵션 > USB 디버깅 켜기
          2. USB 연결 후 폰 화면의 "USB 디버깅 허용" 탭
          3. 세린캠_반납폰_초기화.exe 실행
          4. [기기 검색] > 대상 선택 > [초기화 실행]

          ■ 참고
          * 파이썬, adb 설치 불필요 (EXE에 모두 포함)
          * 삼성계정과 카메라 설정은 보존됩니다.
          * 앱 선택 상태는 [선택 저장]으로 기억시킬 수 있습니다.
          "@ | Out-File -FilePath "dist\사용법.txt" -Encoding utf8
        shell: pwsh

      # 여기서 나온 zip을 Actions 페이지 하단 Artifacts에서 다운로드
      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 세린캠_반납폰_초기화_EXE
          path: dist/
          retention-days: 30
