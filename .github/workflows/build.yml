name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '세린캠_갤럭시_초기화_GUI.py'
      - '.github/workflows/build.yml'
      - 'apks/**'          # APK 교체 시에도 자동 재빌드

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          lfs: true         # Git LFS로 올린 대용량 APK도 함께 받기

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: PyInstaller 설치
        run: python -m pip install --upgrade pip pyinstaller

      - name: platform-tools 다운로드
        run: |
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile "pt.zip"
          Expand-Archive -Path "pt.zip" -DestinationPath "." -Force
          if (-not (Test-Path "platform-tools\adb.exe")) { throw "adb.exe 없음" }
          Write-Host "platform-tools OK"
        shell: pwsh

      - name: EXE 빌드
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "세린캠_반납폰_초기화" `
            --add-data "platform-tools;platform-tools" `
            --exclude-module numpy `
            --exclude-module pandas `
            --exclude-module matplotlib `
            "세린캠_갤럭시_초기화_GUI.py"
        shell: pwsh

      # ── 저장소의 apks 폴더를 결과물에 복사 ──────────────────
      - name: APK 포함
        run: |
          New-Item -ItemType Directory -Force -Path "dist\apks" | Out-Null

          if (Test-Path "apks") {
              $files = Get-ChildItem -Path "apks" -File |
                       Where-Object { $_.Extension -in ".apk", ".xapk", ".apks", ".apkm" }

              if ($files.Count -gt 0) {
                  foreach ($f in $files) {
                      Copy-Item $f.FullName -Destination "dist\apks\" -Force
                      $mb = [math]::Round($f.Length / 1MB, 1)
                      Write-Host "  [포함] $($f.Name)  ($mb MB)"
                  }
                  $total = [math]::Round(($files | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
                  Write-Host "APK $($files.Count)개 포함 (합계 $total MB)"
              } else {
                  Write-Host "apks 폴더가 비어 있습니다 — 빈 폴더로 배포합니다."
              }
          } else {
              Write-Host "apks 폴더 없음 — 빈 폴더로 배포합니다."
          }
        shell: pwsh

      - name: 사용법 생성
        run: |
          @"
          [세린캠 반납폰 초기화 도구]

          1. 폰: 설정 > 개발자 옵션 > USB 디버깅 켜기
          2. USB 연결 후 폰 화면의 "USB 디버깅 허용" 탭
          3. 세린캠_반납폰_초기화.exe 실행
          4. [기기 검색] > 대상 선택 > [초기화 실행]

          * 재설치할 앱은 apks 폴더에 이미 들어있습니다.
            추가/교체하려면 apks 폴더에 넣고 [새로고침]을 누르세요.
          * apks 폴더는 EXE와 같은 위치에 있어야 합니다.
          * 삼성계정과 카메라 설정은 보존됩니다.
          "@ | Out-File -FilePath "dist\사용법.txt" -Encoding utf8
        shell: pwsh

      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 세린캠_반납폰_초기화_EXE
          path: dist/
          retention-days: 30
          compression-level: 0   # APK는 이미 압축본 → 재압축은 시간만 낭비
